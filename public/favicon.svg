<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Hexagonal shield shape (matches MTG logo) -->
  <path d="M32 2 L56 16 L56 48 L32 62 L8 48 L8 16 Z" fill="#0f4d35" stroke="#d4a000" stroke-width="2.5"/>
  <!-- Inner highlight ring -->
  <path d="M32 7 L51 19 L51 45 L32 57 L13 45 L13 19 Z" fill="none" stroke="#d4a000" stroke-width="1" opacity="0.4"/>
  <!-- Snowflake accent at top -->
  <g transform="translate(32, 14)" fill="#d4a000" opacity="0.9">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#d4a000" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#d4a000" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-2.8" y1="-2.8" x2="2.8" y2="2.8" stroke="#d4a000" stroke-width="1" stroke-linecap="round"/>
    <line x1="2.8" y1="-2.8" x2="-2.8" y2="2.8" stroke="#d4a000" stroke-width="1" stroke-linecap="round"/>
  </g>
  <!-- MTG letters -->
  <text x="32" y="44" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-weight="900" font-size="20" fill="white" text-anchor="middle" letter-spacing="-1">MTG</text>
  <!-- Gold bottom banner accent -->
  <path d="M16 50 L48 50 L52 54 L12 54 Z" fill="#d4a000" opacity="0.8"/>
</svg>
